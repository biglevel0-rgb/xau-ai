services:
  xau-ai:
    build: .
    image: xau-ai:latest
    container_name: xau-ai
    restart: unless-stopped
    # Secrets (tokens/keys) live in .env on the server, never in the image.
    env_file:
      - .env
    environment:
      MODE: forecast                 # forecast = bias every cycle; signal = vetted trades only
      DATA_PROVIDER: twelvedata      # Linux server uses the cloud provider
      SYMBOL: XAUUSD
      SIGNAL_TF: M5
      ANALYZE_INTERVAL_SECONDS: "300"
      CONFIG_PATH: config/settings.yaml
    volumes:
      - ./config:/app/config:ro      # edit thresholds/weights without rebuilding
      - ./journal:/app/journal       # persisted decisions
      - ./logs:/app/logs
    # Resource guardrails (optional; tune for your VPS).
    mem_limit: 512m
    cpus: "0.5"
