# -----------------------------------------------------------------------------
# XAU-AI runtime configuration. Non-secret values only.
# Secrets (tokens/keys) live in `.env`. See `.env.example`.
# -----------------------------------------------------------------------------

symbol: XAUUSD
timeframes: [M1, M5, M15, H1]

risk:
  risk_per_trade_pct: 0.5
  min_rr: 2.0
  max_daily_loss_pct: 3.0
  max_weekly_loss_pct: 6.0
  # Trade-plan construction.
  stop_atr_mult: 1.5           # stop distance = 1.5 * ATR
  tp_rr_multiples: [1.0, 2.0, 3.0]
  primary_tp_index: 1          # RR is reported/gated against TP2 (2R)
  atr_period: 14
  account_balance: 10000.0
  contract_size: 100.0         # XAUUSD: 1 lot = 100 oz
  lot_step: 0.01

validator:
  confidence_threshold: 0.85
  # Weight keys MUST match skill names. Calibrated on backtest results (Stage 6).
  # Must sum to ~1.0. `session` is a NEUTRAL liquidity filter, not weighted here.
  weights:
    trend: 0.25
    market_structure: 0.25
    liquidity: 0.20
    order_block: 0.15
    fvg: 0.15
  # Skills that MUST agree with the signal direction, else NO_TRADE.
  # Tighten toward full confluence (add liquidity, order_block, fvg) as desired.
  required_confirmations:
    - trend
    - market_structure
  hard_conditions:
    - min_rr
    - no_high_impact_news
    - mtf_agreement

sessions:
  trade_only_in: [London, NewYork, Overlap]

news:
  block_minutes_before: 15
  block_minutes_after: 15

notifications:
  telegram:
    enabled: true
    send_on: [LONG, SHORT]   # NO_TRADE is not pushed
    include_chart: false     # chart screenshots come in a later stage
