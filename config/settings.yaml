# -----------------------------------------------------------------------------
# XAU-AI runtime configuration. Non-secret values only.
# Secrets (tokens/keys) live in `.env`. See `.env.example`.
# -----------------------------------------------------------------------------

symbol: XAUUSD
timeframes: [M1, M5, M15, H1]

risk:
  risk_per_trade_pct: 0.5
  min_rr: 2.0
  max_daily_loss_pct: 3.0
  max_weekly_loss_pct: 6.0

validator:
  confidence_threshold: 0.85
  # Weights are calibrated on backtest results (Stage 6). Must sum to ~1.0.
  weights:
    trend: 0.20
    market_structure: 0.20
    liquidity: 0.15
    order_blocks: 0.15
    fvg: 0.15
    volume: 0.15
  # Hard conditions — if any fails, the result is NO_TRADE regardless of score.
  hard_conditions:
    - min_rr
    - no_high_impact_news
    - mtf_agreement

sessions:
  trade_only_in: [London, NewYork, Overlap]

news:
  block_minutes_before: 15
  block_minutes_after: 15

notifications:
  telegram:
    enabled: true
    send_on: [LONG, SHORT]   # NO_TRADE is not pushed
    include_chart: false     # chart screenshots come in a later stage
